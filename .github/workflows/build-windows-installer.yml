name: Build Windows Installer

on:
  # Build on changes to installer code on main branch
  push:
    branches:
      - main
      - feature/msi-installer
    paths:
      - 'windows_installer/**'
      - 'VERSION'
  # Also build on version tags (for releases)
  create:
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # Required for creating releases
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PyInstaller
      run: pip install pyinstaller
    
    - name: Generate version_info.txt
      run: python scripts/generate_version_info.py

    - name: Pin repo ref to release tag
      if: startsWith(github.ref, 'refs/tags/v')
      shell: python
      run: |
        import re, os
        tag = os.environ["GITHUB_REF"].replace("refs/tags/", "")

        # Patch installer_logic.py so the frozen binary checks out the exact tag
        with open("windows_installer/installer_logic.py", encoding="utf-8") as f:
            content = f.read()
        patched = re.sub(
            r'DEFAULT_REPO_REF\s*=\s*"main"',
            f'DEFAULT_REPO_REF = "{tag}"',
            content,
        )
        assert patched != content, "DEFAULT_REPO_REF pattern not found – check installer_logic.py"
        with open("windows_installer/installer_logic.py", "w", encoding="utf-8") as f:
            f.write(patched)

        # Patch bootstrap_desktop_app.ps1 default Branch parameter
        with open("bootstrap_desktop_app.ps1", encoding="utf-8") as f:
            content = f.read()
        patched = re.sub(
            r'(\[string\]\$Branch\s*=\s*)"main"',
            rf'\g<1>"{tag}"',
            content,
        )
        assert patched != content, "$Branch pattern not found – check bootstrap_desktop_app.ps1"
        with open("bootstrap_desktop_app.ps1", "w", encoding="utf-8") as f:
            f.write(patched)

        print(f"Pinned DEFAULT_REPO_REF and $Branch to {tag}")

    - name: Verify release Docker image pin
      if: startsWith(github.ref, 'refs/tags/v')
      shell: python
      run: |
        import os
        import tempfile
        import sys

        tag = os.environ["GITHUB_REF"].replace("refs/tags/", "")
        expected_version = tag.removeprefix("v")
        expected_image = f"ghcr.io/valginer0/pgvectorragindexer:{expected_version}"

        os.environ.pop("APP_IMAGE", None)
        os.environ.pop("PGVECTOR_REPO_REF", None)
        sys.path.insert(0, "windows_installer")

        from installer_logic import Installer

        with tempfile.TemporaryDirectory() as install_dir:
            with open(os.path.join(install_dir, "VERSION"), "w", encoding="utf-8") as handle:
                handle.write("0.0.0")
            installer = Installer(install_dir=install_dir)

        assert installer.repo_ref == tag, f"expected release ref {tag}, got {installer.repo_ref}"
        assert installer.app_image == expected_image, (
            f"expected release image {expected_image}, got {installer.app_image}"
        )

    - name: Verify release Docker image is published
      if: startsWith(github.ref, 'refs/tags/v')
      shell: python
      run: |
        import json
        import os
        import time
        import urllib.error
        import urllib.request

        package = "valginer0/pgvectorragindexer"
        tag = os.environ["GITHUB_REF"].replace("refs/tags/v", "")
        manifest_url = f"https://ghcr.io/v2/{package}/manifests/{tag}"
        token_url = f"https://ghcr.io/token?service=ghcr.io&scope=repository:{package}:pull"
        accept = (
            "application/vnd.oci.image.index.v1+json, "
            "application/vnd.docker.distribution.manifest.list.v2+json, "
            "application/vnd.oci.image.manifest.v1+json, "
            "application/vnd.docker.distribution.manifest.v2+json"
        )

        def get_token():
            with urllib.request.urlopen(token_url, timeout=30) as response:
                return json.load(response)["token"]

        def image_exists():
            token = get_token()
            request = urllib.request.Request(
                manifest_url,
                headers={
                    "Authorization": f"Bearer {token}",
                    "Accept": accept,
                    "User-Agent": "PGVectorRAGIndexer-release-check",
                },
                method="HEAD",
            )
            try:
                with urllib.request.urlopen(request, timeout=30) as response:
                    return response.status == 200
            except urllib.error.HTTPError as exc:
                if exc.code == 404:
                    return False
                raise

        for attempt in range(30):
            if image_exists():
                print(f"Found GHCR release image ghcr.io/{package}:{tag}")
                break
            print(f"Waiting for GHCR release image {tag} ({attempt + 1}/30)...")
            time.sleep(20)
        else:
            raise SystemExit(
                f"Release image ghcr.io/{package}:{tag} was not published; "
                "refusing to upload an installer that could pull an older backend."
            )

    - name: Build installer (onedir, no UPX)
      working-directory: windows_installer
      run: |
        # Note: --add-data "SOURCE;DEST" (Windows separator is ;)
        # We add ../VERSION to the root of the bundled app (.)
        python -m PyInstaller --onedir --windowed --name "PGVectorRAGIndexer-Setup" --version-file version_info.txt --add-data "../VERSION;." --noupx --clean --noconfirm installer_gui.py

    # WiX Toolset Steps
    - name: Add WiX to PATH
      run: echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH

    - name: Harvest Files (Heat)
      working-directory: windows_installer
      run: |
        # Harvest the dist/PGVectorRAGIndexer-Setup folder into a WiX fragment
        # -dr INSTALLFOLDER: References the Directory ID in project.wxs
        # -cg HarvestedComponents: The ComponentGroup ID to create
        # -t filter.xslt: Apply the filter to remove the main exe (avoid duplicates)
        heat dir dist/PGVectorRAGIndexer-Setup -dr INSTALLFOLDER -cg HarvestedComponents -gg -g1 -sf -srd -var "var.SourceDir" -t filter.xslt -out harvested.wxs

    - name: Compile WiX Configuration
      run: |
         # Pass the version from VERSION file
         $VER = Get-Content VERSION
         candle -arch x64 -dProductVersion="$VER" -ext WixUIExtension -ext WixUtilExtension -out windows_installer/project.wixobj windows_installer/project.wxs
         candle -arch x64 -dSourceDir="dist/PGVectorRAGIndexer-Setup" -ext WixUIExtension -ext WixUtilExtension -out windows_installer/harvested.wixobj windows_installer/harvested.wxs
         candle -arch x64 -ext WixUIExtension -ext WixUtilExtension -out windows_installer/ui.wixobj windows_installer/ui.wxs

    - name: Link MSI
      run: |
         light -out dist/PGVectorRAGIndexer.msi -ext WixUIExtension -ext WixUtilExtension -cultures:en-us -loc windows_installer/en-us.wxl -b dist/PGVectorRAGIndexer windows_installer/project.wixobj windows_installer/harvested.wixobj windows_installer/ui.wixobj

    - name: Upload MSI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PGVectorRAGIndexer.msi
        path: dist/PGVectorRAGIndexer.msi
        if-no-files-found: error
    
    # Release step (only on tags)
    - name: Extract release notes from CHANGELOG
      if: startsWith(github.ref, 'refs/tags/')
      id: notes
      shell: python
      run: |
        import re, os
        version = os.environ["GITHUB_REF"].replace("refs/tags/v", "")
        with open("CHANGELOG.md", encoding="utf-8") as f:
            content = f.read()
        pattern = rf"(## \[{re.escape(version)}\].*?)(?=\n## \[)"
        match = re.search(pattern, content, re.DOTALL)
        notes = match.group(1).strip() if match else f"Release v{version}"
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
            out.write(f"notes<<EOF\n{notes}\nEOF\n")

    - name: Upload MSI to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        body: ${{ steps.notes.outputs.notes }}
        files: |
          dist/PGVectorRAGIndexer.msi
          install.command
          install-linux.sh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
